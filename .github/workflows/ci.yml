name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.85

    - name: Cache cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose

  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: foxkv
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: foxkv
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: foxkv.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: foxkv

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install musl tools
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: sudo apt-get update && sudo apt-get install -y musl-tools

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }} --bin foxkv

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: foxkv-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: docker build -t foxkv:test .

    - name: Test Docker image
      run: |
        docker run -d --name foxkv-test -p 6379:6379 foxkv:test
        sleep 3
        # Test using netcat to check if port is open
        nc -zv localhost 6379 || (docker logs foxkv-test && exit 1)
        # Send PING command using raw TCP
        echo -e "*1\r\n$4\r\nPING\r\n" | nc localhost 6379 | grep -q "PONG" || (docker logs foxkv-test && exit 1)
        docker stop foxkv-test
        docker rm foxkv-test
